zerops:
  - setup: pipers 
    build:
      base: python@3.12
      deployFiles: /~
      addToRunPrepare:
        - requirements.txt
    run:
      ports:
        - port: 8000
          httpSupport: true
      base: python@3.12
      prepareCommands:
        - python3 -m pip install --ignore-installed -r requirements.txt
      start: uvicorn main:app --host 0.0.0.0 --port 8000
